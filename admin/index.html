<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Content Admin — Davide Piraldo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
  <div id="local-hint" style="display:none;font-family:system-ui,sans-serif;max-width:520px;margin:40px auto;padding:24px;border:1px solid #c9a86a;background:#17130f;color:#f1efe9;line-height:1.6;">
    <strong>Admin locale — server mancante</strong>
    <p style="margin:12px 0 0;">Decap sta cercando il proxy locale, che non risulta attivo.</p>
    <p style="margin:12px 0 0;">1. Installa <a href="https://nodejs.org" style="color:#c9a86a;">Node.js</a> (se non l'hai già)<br>
    2. Nella cartella del sito esegui: <code style="background:#2a2420;padding:2px 6px;">./start-local.sh</code><br>
    3. Riapri <a href="/admin/" style="color:#c9a86a;">/admin/</a></p>
    <p style="margin:12px 0 0;font-size:13px;color:#8c8579;">Il login con GitHub serve solo quando il sito è online su Netlify.</p>
  </div>

  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script src="./translate-widget.js"></script>
  <script src="./preview-templates.js"></script>
  <script>
    var isLocal = location.hostname === 'localhost' || location.hostname === '127.0.0.1';

    if (isLocal) {
      fetch('http://localhost:8081/api/v1', { mode: 'no-cors' })
        .catch(function () {
          document.getElementById('local-hint').style.display = 'block';
        });
    }
  </script>
</body>
</html>
