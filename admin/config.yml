# Online (Netlify): git-gateway salva su GitHub.
# In locale: decap-server su localhost only (non su Netlify).
local_backend:
  url: http://localhost:8081/api/v1
  allowed_hosts: ['localhost', '127.0.0.1']

backend:
  name: git-gateway
  branch: main
  commit_messages:
    create: 'Create {{collection}} "{{slug}}"'
    update: 'Update {{collection}} "{{slug}}"'
    delete: 'Delete {{collection}} "{{slug}}"'
    uploadMedia: 'Upload "{{path}}"'
    deleteMedia: 'Delete "{{path}}"'

# Una volta pubblicato online, si accede da tuosito.com/admin con Netlify Identity.
media_folder: "images/uploads"
public_folder: "/images/uploads"

# Git Gateway rifiuta upload oltre ~900 KB per file — comprimi le foto prima.
# (max_file_size va sui singoli widget image/file, non a livello globale)

collections:

  # ---- PROPERTIES (il modello principale — un file per ogni immobile) ----
  # Ogni proprietà è un file JSON separato. La pagina pubblica è sempre
  # property-template.html?slug=<slug> — stesso design, dati diversi.
  - name: "properties"
    label: "🏠 Immobili in Vendita"
    label_singular: "Immobile"
    folder: "content/properties"
    create: true
    slug: "{{slug}}"
    extension: "json"
    format: "json"
    identifier_field: "building_name"
    summary: "{{building_name}} — {{status_label}}"
    fields:
      # ---- ESSENZIALI — quello che si modifica più spesso ----
      - { label: "Nome edificio", name: "building_name", widget: "string" }
      - { label: "Slug (per il link, es. eden-tower)", name: "slug", widget: "string", hint: "Solo minuscole e trattini, niente spazi." }
      - { label: "Indirizzo", name: "address_line", widget: "string" }
      - { label: "Stato annuncio (es. In vendita · Agente Unico)", name: "status_label", widget: "string" }
      - { label: "Camere totali", name: "rooms", widget: "number" }
      - { label: "Stanze da letto", name: "bedrooms", widget: "number" }
      - { label: "Bagni", name: "bathrooms", widget: "number" }
      - { label: "Vista (es. Mare & Montagna)", name: "views_label", widget: "string" }
      - { label: "Email di contatto per questo immobile", name: "contact_email", widget: "string" }

      # ---- Meno frequenti — restano visibili ma più in basso ----
      - { label: "Riferimento interno", name: "reference", widget: "string" }
      - { label: "Tipo (es. Appartamento · 4 Locali)", name: "type_line", widget: "string" }
      - { label: "Condizione", name: "condition", widget: "string", default: "Renovated" }
      - { label: "Disponibilità", name: "availability", widget: "string", default: "Immediately" }
      - { label: "Mandato", name: "mandate", widget: "string", default: "Sole Agent" }
      - { label: "Nome quartiere/i (testo libero per la scheda dettagli)", name: "district_names", widget: "string" }

      # ---- Gruppi chiusi di default — si aprono solo se servono ----
      - label: "Comfort e Servizi (attiva/disattiva)"
        name: "amenities"
        widget: "object"
        fields:
          - { label: "Concierge", name: "concierge", widget: "boolean", default: false }
          - { label: "Chambre de Bonne", name: "chambre_bonne", widget: "boolean", default: false }
          - { label: "Uso misto consentito", name: "mixed_use", widget: "boolean", default: false }
          - { label: "Piscina", name: "pool", widget: "boolean", default: false }
          - { label: "Palestra", name: "gym", widget: "boolean", default: false }

      - label: "📷 Foto e Video"
        name: "media"
        widget: "object"
        hint: "Foto principali dell'immobile. Le opzioni di inquadratura (Focus) servono solo se una foto è verticale o taglia male — lasciale su Center se va già bene così."
        fields:
          - label: "Hero: Video o Foto?"
            name: "hero_mode"
            widget: "select"
            options:
              - { label: "Video (se caricato qui sotto)", value: "video" }
              - { label: "Solo foto (ignora il video anche se presente)", value: "photo" }
            default: "video"
          - { label: "Hero — Foto (usata anche se scegli Solo Foto)", name: "hero_fallback_image", widget: "image" }
          - { label: "Focus Foto Hero (Top/Bottom se verticale, Left/Right se molto larga)", name: "hero_fallback_image_focus", widget: "select", options: ["Center", "Top", "Bottom", "Left", "Right"], default: "Center", required: false }
          - label: "Hero — Video 1 (.mp4, ignorato se hai scelto Solo Foto)"
            name: "hero_video_1"
            widget: "file"
            required: false
          - { label: "Hero — Video 2 (opzionale, .mp4)", name: "hero_video_2", widget: "file", required: false }
          - { label: "Foto Edificio (esterno)", name: "hero_side_image", widget: "image" }
          - { label: "Focus Foto Edificio", name: "hero_side_image_focus", widget: "select", options: ["Center", "Top", "Bottom", "Left", "Right"], default: "Center", required: false }
          - { label: "Foto Living / Interno", name: "intro_photo", widget: "image" }
          - { label: "Focus Foto Living", name: "intro_photo_focus", widget: "select", options: ["Center", "Top", "Bottom", "Left", "Right"], default: "Center", required: false }
          - { label: "Galleria — 2 Foto Grandi in evidenza", name: "gallery_featured", widget: "list", field: { label: "Foto", name: "image", widget: "image" } }
          - { label: "Galleria — Griglia Bloccata (foto sfocate teaser)", name: "gallery_locked", widget: "list", field: { label: "Foto", name: "image", widget: "image" } }

      - { label: "Testo sotto la griglia bloccata", name: "gallery_locked_text", widget: "string", default: "+12 additional photographs, floor plans and a private viewing await you." }

      - label: "📊 Quartieri per Market Intelligence"
        name: "districts"
        widget: "list"
        max: 2
        hint: "Scegli 1 quartiere (dati singoli) o 2 (confronto). Es. Eden Tower: Jardin Exotique + La Condamine · Le Mirabeau: Carré d'Or + Larvotto. I numeri si aggiornano da soli."
        fields:
          - label: "Quartiere"
            name: "key"
            widget: "select"
            options: ["monte-carlo", "carre-dor", "jardin-exotique", "la-condamine", "larvotto", "la-rousse", "fontvieille", "moneghetti", "monaco-ville"]

      - label: "🗂️ Schede Caratteristiche (max 4, sempre visibili)"
        name: "features"
        widget: "list"
        max: 4
        hint: "Es. Superficie Abitabile, Camere, Bagni, Vista. Puoi aggiungere una foto di copertina per ogni scheda. Testi solo in inglese per ora — se li lasci vuoti restano quelli già nella pagina."
        fields:
          - { label: "Titolo", name: "title", widget: "string" }
          - { label: "Descrizione", name: "desc", widget: "text" }
          - { label: "Foto di copertina (opzionale)", name: "image", widget: "image", required: false }

      - label: "✍️ Testi (Inglese, Francese, Italiano)"
        name: "i18n"
        widget: "multilingual-editor"
        languages: ["en", "fr", "it"]
        source_language: "en"
        hint: "Scrivi in inglese, poi premi \"Traduci\" per generare francese e italiano con DeepL. Puoi sempre correggere a mano dopo."
        text_fields:
          - { name: "hero_title", label: "Titolo Hero (HTML, <em> per il corsivo)", type: "string" }
          - { name: "p1", label: "Paragrafo Descrizione 1", type: "text" }
          - { name: "p2", label: "Paragrafo Descrizione 2", type: "text" }
          - { name: "p3", label: "Paragrafo Descrizione 3", type: "text" }
          - { name: "market_title", label: "Titolo Sezione Mercato (HTML — meglio lasciare vuoto: si genera da solo)", type: "string" }
          - { name: "market_insight_title", label: "Titolo Analisi di Mercato", type: "string" }
          - { name: "market_insight", label: "Testo Analisi di Mercato", type: "text" }

  # ---- HOMEPAGE ----
  - name: "homepage"
    label: "🏡 Homepage"
    files:
      - file: "content/homepage.json"
        label: "Contenuto Homepage"
        name: "homepage"
        fields:
          - label: "Hero (prima schermata)"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Sopratitolo", name: "eyebrow", widget: "string" }
              - { label: "Titolo (il tuo nome)", name: "title", widget: "string" }
              - { label: "Ruolo", name: "role", widget: "string" }
              - { label: "Affiliazione", name: "affiliation", widget: "string" }
              - { label: "Foto di sfondo", name: "hero_image", widget: "image", required: false }
              - { label: "Etichetta Scroll", name: "scroll_label", widget: "string", default: "Scroll" }
          - label: "Posizionamento"
            name: "positioning"
            widget: "object"
            fields:
              - { label: "Etichetta sezione", name: "label", widget: "string" }
              - { label: "Frase principale", name: "statement", widget: "text" }
              - label: "I tre pilastri"
                name: "pillars"
                widget: "list"
                max: 3
                fields:
                  - { label: "Titolo", name: "title", widget: "string" }
                  - { label: "Testo", name: "text", widget: "text" }
          - label: "Statistiche di Mercato (striscia numeri)"
            name: "market"
            widget: "object"
            fields:
              - { label: "Etichetta sezione", name: "label", widget: "string" }
              - label: "Numeri (4 riquadri)"
                name: "stats"
                widget: "list"
                max: 4
                fields:
                  - { label: "Valore", name: "value", widget: "string" }
                  - { label: "Etichetta", name: "label", widget: "string" }
                  - { label: "Evidenzia in oro?", name: "highlight", widget: "boolean", default: false }
              - { label: "Riga fonte", name: "source", widget: "string" }
          - label: "Proprietà in Evidenza (mostrata in homepage)"
            name: "featured_property_slug"
            widget: "relation"
            collection: "properties"
            search_fields: ["building_name"]
            display_fields: ["building_name"]
            value_field: "{{slug}}"
            default: "eden-tower"
            hint: "Cerca e scegli l'immobile da un menu — non serve più scrivere lo slug a mano."
          - label: "Anteprima Journal (homepage)"
            name: "journal"
            widget: "object"
            fields:
              - { label: "Etichetta sezione", name: "label", widget: "string" }
              - { label: "Titolo", name: "heading", widget: "string" }
              - label: "Slug articoli in evidenza (3 schede, in ordine)"
                name: "featured_slugs"
                widget: "list"
                max: 3
                field:
                  label: "Articolo"
                  name: "slug"
                  widget: "relation"
                  collection: "articles"
                  search_fields: ["slug", "i18n.en.title"]
                  display_fields: ["slug", "i18n.en.title"]
                  value_field: "{{slug}}"
                  hint: "Cerca per titolo o slug."
          - label: "Sezione Contatti"
            name: "contact"
            widget: "object"
            fields:
              - { label: "Etichetta", name: "label", widget: "string" }
              - { label: "Titolo", name: "heading", widget: "string" }
              - { label: "Testo", name: "text", widget: "text" }
              - { label: "Email", name: "email", widget: "string" }
              - { label: "URL Instagram", name: "instagram_url", widget: "string" }
              - { label: "Etichetta bottone Instagram", name: "instagram_label", widget: "string" }
          - label: "Footer"
            name: "footer"
            widget: "object"
            fields:
              - { label: "Nome", name: "name", widget: "string" }
              - { label: "Riga ruolo", name: "role", widget: "string" }

  # ---- JOURNAL ARTICLES ----
  - name: "articles"
    label: "📰 Articoli Journal"
    label_singular: "Articolo"
    folder: "content/articles"
    create: true
    slug: "{{slug}}"
    extension: "json"
    format: "json"
    identifier_field: "slug"
    summary: "{{fields.i18n.en.title}}"
    fields:
      - { label: "Slug (id URL, es. 01-how-to-buy-property-in-monaco)", name: "slug", widget: "string" }
      - { label: "Pubblicato?", name: "published", widget: "boolean", default: true }
      - { label: "Categoria", name: "category", widget: "string" }

      - label: "✍️ Testi (Inglese, Francese, Italiano)"
        name: "i18n"
        widget: "multilingual-editor"
        languages: ["en", "fr", "it"]
        source_language: "en"
        hint: "Scrivi l'articolo in inglese, poi premi \"Traduci\" per generare francese e italiano con DeepL. Rileggi sempre la traduzione prima di pubblicare, specialmente per articoli su tasse/compliance."
        text_fields:
          - { name: "title", label: "Titolo", type: "string" }
          - { name: "excerpt", label: "Estratto (riassunto per la card)", type: "text" }
          - { name: "body_html", label: "Testo completo (HTML — mantieni le classi come lead, quote, stats, steps)", type: "text" }
          - { name: "disclaimer", label: "Disclaimer specifico dell'articolo", type: "text" }

      - { label: "Data mostrata", name: "date", widget: "string" }
      - { label: "Tempo di lettura", name: "read_time", widget: "string", default: "5 min read" }
      - { label: "Foto di copertina", name: "hero_image", widget: "image", required: false }
      - { label: "Riga fonti", name: "sources", widget: "string", required: false }
      - { label: "Testo teaser proprietà in evidenza", name: "featured_property_text", widget: "string", required: false }

  - name: "articles_order"
    label: "🔢 Journal — Ordine Articoli"
    files:
      - file: "content/articles-order.json"
        label: "Ordine di visualizzazione nell'indice Journal"
        name: "articles_order"
        fields:
          - label: "Articoli, in ordine di visualizzazione"
            name: "order"
            widget: "list"
            field:
              label: "Articolo"
              name: "slug"
              widget: "relation"
              collection: "articles"
              search_fields: ["slug", "i18n.en.title"]
              display_fields: ["slug", "i18n.en.title"]
              value_field: "{{slug}}"
              hint: "Cerca per titolo o slug."

  # ---- SOLD PROPERTIES ----
  # Un unico file con una lista dentro — nel CMS ottieni una sola schermata
  # dove Aggiungere/Rimuovere/Riordinare/Duplicare ogni immobile venduto,
  # senza toccare properties-sold.html.
  - name: "sold_properties"
    label: "✅ Immobili Venduti"
    files:
      - file: "content/sold-properties.json"
        label: "Immobili Venduti"
        name: "sold_properties"
        fields:
          - label: "Immobili Venduti"
            name: "properties"
            widget: "list"
            label_singular: "Immobile"
            summary: "{{fields.name}} — {{fields.location}} ({{fields.date_sold}})"
            fields:
              - { label: "Nome Immobile", name: "name", widget: "string" }
              - { label: "Posizione", name: "location", widget: "string" }
              - { label: "Prezzo di Vendita", name: "price", widget: "string" }
              - { label: "Anno / Data Vendita", name: "date_sold", widget: "string" }
              - { label: "Camere da letto", name: "bedrooms", widget: "number", required: false }
              - { label: "Superficie (es. 480m²)", name: "surface", widget: "string", required: false }
              - { label: "Foto", name: "photo", widget: "image", required: false }
              - { label: "Descrizione breve", name: "description", widget: "text", required: false }
