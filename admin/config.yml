# Online (Netlify): git-gateway saves via GitHub.
# Local: run `npx decap-server` on localhost only (not on Netlify).
local_backend:
  url: http://localhost:8081/api/v1
  allowed_hosts: ['localhost', '127.0.0.1']

backend:
  name: git-gateway
  branch: main

# After setup, editors log in at yoursite.com/admin using Netlify Identity.
media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:

  # ---- PROPERTIES (the master template — one file per listing) ----
  # Each property is a separate JSON file. The public page is always
  # property-template.html?slug=<the-slug> — same design, different data.
  - name: "properties"
    label: "Properties"
    folder: "content/properties"
    create: true
    slug: "{{slug}}"
    extension: "json"
    format: "json"
    identifier_field: "building_name"
    summary: "{{building_name}} · {{slug}}"
    fields:
      - { label: "Slug (used in the URL, e.g. eden-tower)", name: "slug", widget: "string" }
      - { label: "Featured on homepage?", name: "featured", widget: "boolean", default: false }
      - { label: "Reference", name: "reference", widget: "string" }
      - { label: "Building Name", name: "building_name", widget: "string" }
      - { label: "Address Line", name: "address_line", widget: "string" }
      - { label: "Status (e.g. For Sale · Sole Agent)", name: "status_label", widget: "string" }
      - { label: "Rooms", name: "rooms", widget: "number" }
      - { label: "Bedrooms", name: "bedrooms", widget: "number" }
      - { label: "Bathrooms", name: "bathrooms", widget: "number" }
      - { label: "Type Line (e.g. Apartment · 4 Rooms)", name: "type_line", widget: "string" }
      - { label: "Condition", name: "condition", widget: "string", default: "Renovated" }
      - { label: "Views Label", name: "views_label", widget: "string" }
      - { label: "Availability", name: "availability", widget: "string", default: "Immediately" }
      - { label: "Mandate", name: "mandate", widget: "string", default: "Sole Agent" }
      - { label: "District Name(s) shown on Details sheet", name: "district_names", widget: "string" }
      - { label: "Contact Email", name: "contact_email", widget: "string" }

      - label: "Amenities (toggles which highlights appear)"
        name: "amenities"
        widget: "object"
        fields:
          - { label: "Concierge", name: "concierge", widget: "boolean", default: false }
          - { label: "Chambre de Bonne", name: "chambre_bonne", widget: "boolean", default: false }
          - { label: "Mixed Use Allowed", name: "mixed_use", widget: "boolean", default: false }
          - { label: "Pool", name: "pool", widget: "boolean", default: false }
          - { label: "Gym", name: "gym", widget: "boolean", default: false }

      - label: "Media"
        name: "media"
        widget: "object"
        fields:
          - label: "Hero Display"
            name: "hero_mode"
            widget: "select"
            options:
              - { label: "Video (plays over the fallback photo below)", value: "video" }
              - { label: "Photo only (never plays a video, even if uploaded below)", value: "photo" }
            default: "video"
          - { label: "Hero Fallback / Photo-only Image", name: "hero_fallback_image", widget: "image" }
          - label: "Hero Fallback Photo Focus (use Top/Bottom for a vertical photo, Left/Right for a wide horizontal one)"
            name: "hero_fallback_image_focus"
            widget: "select"
            options: ["Center", "Top", "Bottom", "Left", "Right"]
            default: "Center"
            required: false
          - { label: "Hero Video — Clip 1 (.mp4 — ignored if Hero Display is Photo only)", name: "hero_video_1", widget: "file", required: false }
          - { label: "Hero Video — Clip 2 (optional, .mp4)", name: "hero_video_2", widget: "file", required: false }
          - { label: "Hero Side Photo (building exterior)", name: "hero_side_image", widget: "image" }
          - label: "Hero Side Photo Focus (use Top/Bottom for a vertical photo, Left/Right for a wide horizontal one)"
            name: "hero_side_image_focus"
            widget: "select"
            options: ["Center", "Top", "Bottom", "Left", "Right"]
            default: "Center"
            required: false
          - { label: "Intro Photo (living room)", name: "intro_photo", widget: "image" }
          - label: "Intro Photo Focus (use Top/Bottom for a vertical photo, Left/Right for a wide horizontal one)"
            name: "intro_photo_focus"
            widget: "select"
            options: ["Center", "Top", "Bottom", "Left", "Right"]
            default: "Center"
            required: false
          - { label: "Gallery — Featured Photos (2 large previews)", name: "gallery_featured", widget: "list", field: { label: "Photo", name: "image", widget: "image" } }
          - { label: "Gallery — Locked Grid (blurred teaser photos)", name: "gallery_locked", widget: "list", field: { label: "Photo", name: "image", widget: "image" } }

      - { label: "Gallery Locked Caption", name: "gallery_locked_text", widget: "string", default: "+12 additional photographs, floor plans and a private viewing await you." }

      - label: "Districts (1 = single district, 2 = comparison like Eden Tower)"
        name: "districts"
        widget: "list"
        max: 2
        fields:
          - label: "District"
            name: "key"
            widget: "select"
            options: ["monte-carlo", "jardin-exotique", "la-condamine", "larvotto", "la-rousse", "fontvieille", "moneghetti", "monaco-ville"]

      - label: "Feature Cards 1–4 (always shown, e.g. Living Space, Bedrooms, Bathrooms, Views)"
        name: "features"
        widget: "list"
        max: 4
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Description", name: "desc", widget: "text" }

      - label: "Bilingual Content"
        name: "i18n"
        widget: "object"
        fields:
          - label: "English"
            name: "en"
            widget: "object"
            fields:
              - { label: "Hero Title (HTML, use <em> for italics)", name: "hero_title", widget: "string" }
              - { label: "Description Paragraph 1", name: "p1", widget: "text" }
              - { label: "Description Paragraph 2", name: "p2", widget: "text" }
              - { label: "Description Paragraph 3", name: "p3", widget: "text" }
              - { label: "Quote", name: "quote_text", widget: "text" }
              - { label: "Quote Attribution", name: "quote_cite", widget: "string" }
              - { label: "Market Section Title (HTML)", name: "market_title", widget: "string" }
              - { label: "Market Insight Title", name: "market_insight_title", widget: "string" }
              - { label: "Market Insight Text", name: "market_insight", widget: "text" }
          - label: "Français"
            name: "fr"
            widget: "object"
            fields:
              - { label: "Titre Hero (HTML)", name: "hero_title", widget: "string" }
              - { label: "Paragraphe 1", name: "p1", widget: "text" }
              - { label: "Paragraphe 2", name: "p2", widget: "text" }
              - { label: "Paragraphe 3", name: "p3", widget: "text" }
              - { label: "Citation", name: "quote_text", widget: "text" }
              - { label: "Attribution Citation", name: "quote_cite", widget: "string" }
              - { label: "Titre Section Marché (HTML)", name: "market_title", widget: "string" }
              - { label: "Titre Analyse Marché", name: "market_insight_title", widget: "string" }
              - { label: "Texte Analyse Marché", name: "market_insight", widget: "text" }

  # ---- HOMEPAGE ----
  - name: "homepage"
    label: "Homepage"
    files:
      - file: "content/homepage.json"
        label: "Homepage Content"
        name: "homepage"
        fields:
          - label: "Hero"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Title (your name)", name: "title", widget: "string" }
              - { label: "Role", name: "role", widget: "string" }
              - { label: "Affiliation", name: "affiliation", widget: "string" }
              - { label: "Hero Background Photo", name: "hero_image", widget: "image", required: false }
              - { label: "Scroll Label", name: "scroll_label", widget: "string", default: "Scroll" }
          - label: "Positioning"
            name: "positioning"
            widget: "object"
            fields:
              - { label: "Section Label", name: "label", widget: "string" }
              - { label: "Main Statement", name: "statement", widget: "text" }
              - label: "Three Pillars"
                name: "pillars"
                widget: "list"
                max: 3
                fields:
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Text", name: "text", widget: "text" }
          - label: "Market Statistics Strip"
            name: "market"
            widget: "object"
            fields:
              - { label: "Section Label", name: "label", widget: "string" }
              - label: "Stats (4 boxes)"
                name: "stats"
                widget: "list"
                max: 4
                fields:
                  - { label: "Value", name: "value", widget: "string" }
                  - { label: "Label", name: "label", widget: "string" }
                  - { label: "Highlight in gold?", name: "highlight", widget: "boolean", default: false }
              - { label: "Source Line", name: "source", widget: "string" }
          - { label: "Featured Property Slug (must match a property entry)", name: "featured_property_slug", widget: "string", default: "eden-tower" }
          - label: "Journal Teaser (homepage)"
            name: "journal"
            widget: "object"
            fields:
              - { label: "Section Label", name: "label", widget: "string" }
              - { label: "Heading", name: "heading", widget: "string" }
              - label: "Featured Article Slugs (3 cards, in order)"
                name: "featured_slugs"
                widget: "list"
                max: 3
                field: { label: "Article slug", name: "slug", widget: "string" }
          - label: "Contact Section"
            name: "contact"
            widget: "object"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Text", name: "text", widget: "text" }
              - { label: "Email", name: "email", widget: "string" }
              - { label: "Instagram URL", name: "instagram_url", widget: "string" }
              - { label: "Instagram Button Label", name: "instagram_label", widget: "string" }
          - label: "Footer"
            name: "footer"
            widget: "object"
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Role Line", name: "role", widget: "string" }

  # ---- JOURNAL ARTICLES ----
  - name: "articles"
    label: "Journal Articles"
    folder: "content/articles"
    create: true
    slug: "{{slug}}"
    extension: "json"
    format: "json"
    identifier_field: "title"
    fields:
      - { label: "Slug (URL id, e.g. 01-how-to-buy-property-in-monaco)", name: "slug", widget: "string" }
      - { label: "Published?", name: "published", widget: "boolean", default: true }
      - { label: "Category", name: "category", widget: "string" }
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date shown", name: "date", widget: "string" }
      - { label: "Read time", name: "read_time", widget: "string", default: "5 min read" }
      - { label: "Excerpt (card summary)", name: "excerpt", widget: "text" }
      - { label: "Hero Photo", name: "hero_image", widget: "image", required: false }
      - { label: "Article Body (HTML — keep classes like lead, quote, stats, steps)", name: "body_html", widget: "text" }
      - { label: "Sources Line", name: "sources", widget: "string", required: false }
      - { label: "Disclaimer", name: "disclaimer", widget: "text", required: false }
      - { label: "Featured Property Teaser Text", name: "featured_property_text", widget: "string", required: false }

  - name: "articles_order"
    label: "Journal — Article Order"
    files:
      - file: "content/articles-order.json"
        label: "Display Order on Journal Index"
        name: "articles_order"
        fields:
          - label: "Article slugs in display order"
            name: "order"
            widget: "list"
            field: { label: "Slug", name: "slug", widget: "string" }

  # ---- SOLD PROPERTIES ----
  # A single file with a list inside — in the CMS this gives you one screen
  # where you can Add/Remove/Reorder/Duplicate each sold property directly,
  # no separate files and no manual edits to properties-sold.html needed.
  - name: "sold_properties"
    label: "Sold Properties"
    files:
      - file: "content/sold-properties.json"
        label: "Sold Properties"
        name: "sold_properties"
        fields:
          - label: "Sold Properties"
            name: "properties"
            widget: "list"
            label_singular: "Property"
            summary: "{{fields.name}} — {{fields.location}} ({{fields.date_sold}})"
            fields:
              - { label: "Property Name", name: "name", widget: "string" }
              - { label: "Location", name: "location", widget: "string" }
              - { label: "Sale Price", name: "price", widget: "string" }
              - { label: "Year / Date Sold", name: "date_sold", widget: "string" }
              - { label: "Bedrooms", name: "bedrooms", widget: "number", required: false }
              - { label: "Surface (e.g. 480m²)", name: "surface", widget: "string", required: false }
              - { label: "Photo", name: "photo", widget: "image", required: false }
              - { label: "Short Description", name: "description", widget: "text", required: false }
