<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Article — The Monaco Journal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Jost:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink: oklch(0.14 0.015 50); --charcoal: oklch(0.20 0.015 50);
    --gold: oklch(0.72 0.13 85); --ivory: oklch(0.95 0.006 90);
    --stone: oklch(0.55 0.015 70); --line: oklch(0.28 0.02 60); --body: oklch(0.80 0.008 70);
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--ink);color:var(--ivory);font-family:'Jost',sans-serif;}
  a{color:inherit;}
  .nav{display:flex;justify-content:space-between;align-items:center;padding:22px 6%;border-bottom:1px solid var(--line);}
  .wordmark{font-family:'Cormorant Garamond',serif;font-size:20px;letter-spacing:.04em;text-transform:uppercase;}
  .header{padding:100px 6% 0;max-width:780px;margin:0 auto;}
  .eyebrow{font-size:11px;letter-spacing:.25em;color:var(--gold);text-transform:uppercase;}
  h1{font-family:'Cormorant Garamond',serif;font-weight:500;font-size:58px;line-height:1.1;margin-top:24px;}
  .metarow{display:flex;gap:24px;margin-top:32px;font-size:12px;letter-spacing:.05em;color:var(--stone);text-transform:uppercase;}
  .hero{padding:56px 6% 0;max-width:1100px;margin:0 auto;}
  .hero-inner{height:440px;overflow:hidden;}
  .img-placeholder{height:100%;background:repeating-linear-gradient(135deg,oklch(0.24 0.015 55),oklch(0.24 0.015 55) 14px,oklch(0.20 0.015 55) 14px,oklch(0.20 0.015 55) 28px);display:flex;align-items:center;justify-content:center;color:var(--stone);font-size:13px;letter-spacing:.1em;}
  .content{padding:72px 6% 0;max-width:720px;margin:0 auto;font-size:17px;line-height:1.9;color:var(--body);}
  .content .lead{font-family:'Cormorant Garamond',serif;font-size:26px;color:var(--ivory);line-height:1.6;margin:0 0 32px;}
  .content .quote{margin:48px 0;padding-left:24px;border-left:2px solid var(--gold);font-family:'Cormorant Garamond',serif;font-size:24px;color:var(--ivory);line-height:1.5;}
  .content h3{font-family:'Cormorant Garamond',serif;font-weight:500;font-size:28px;color:var(--ivory);margin:56px 0 20px;}
  .content .steps{list-style:none;padding:0;margin:0;counter-reset:step;}
  .content .steps li{counter-increment:step;position:relative;padding:0 0 28px 52px;}
  .content .steps li::before{content:counter(step);position:absolute;left:0;top:0;width:34px;height:34px;border:1px solid var(--gold);color:var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:16px;}
  .content .stats{margin:56px 0;display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--line);}
  .content .stat{background:var(--ink);padding:28px 20px;text-align:center;}
  .content .stat .num{font-family:'Cormorant Garamond',serif;font-size:30px;color:var(--gold);}
  .content .stat .lbl{font-size:10px;letter-spacing:.1em;color:var(--stone);text-transform:uppercase;margin-top:8px;}
  .footer{padding:64px 6% 120px;max-width:720px;margin:64px auto 0;border-top:1px solid var(--line);}
  .footrow{display:flex;justify-content:space-between;align-items:center;padding-top:48px;flex-wrap:wrap;gap:16px;}
  .authname{font-family:'Cormorant Garamond',serif;font-size:20px;}
  .authrole{font-size:11px;letter-spacing:.15em;color:var(--stone);text-transform:uppercase;margin-top:4px;}
  .source{font-size:10px;letter-spacing:.1em;color:var(--stone);text-transform:uppercase;}
  .disclaimer{font-size:12px;color:var(--stone);line-height:1.7;margin-top:24px;}
  @media (max-width:700px){h1{font-size:38px;} .content .stats{grid-template-columns:1fr;}}
</style>
</head>
<body>

  <div class="nav">
    <a class="wordmark" href="blog-index.html">Davide Piraldo</a>
    <div style="display:flex;gap:32px;font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:var(--stone);">
      <a href="index.html">Home</a>
      <a href="properties-index.html">Property</a>
      <a href="blog-index.html">Journal</a>
      <a href="index.html#contact">Contact</a>
    </div>
  </div>

  <section class="header">
    <div class="eyebrow" data-article="category">Category</div>
    <h1 data-article="title">Article title</h1>
    <div class="metarow">
      <span>Davide Piraldo</span><span>·</span>
      <span data-article="date">Date</span><span>·</span>
      <span data-article="read_time">Read time</span>
    </div>
  </section>

  <section class="hero">
    <div class="hero-inner" id="article-hero">
      <div class="img-placeholder">Article photograph</div>
    </div>
  </section>

  <section class="content" id="article-body"></section>

  <a id="featured-property-link" href="properties-index.html" style="display:block;max-width:720px;margin:0 auto;padding:0 6%;">
    <div style="margin-top:56px;padding:28px 32px;border:1px solid var(--line);">
      <div style="font-size:10px;letter-spacing:.2em;color:var(--gold);text-transform:uppercase;margin-bottom:10px;">Featured Property</div>
      <div style="font-family:'Cormorant Garamond',serif;font-size:22px;" data-article="featured_property_text">→</div>
    </div>
  </a>

  <section class="footer">
    <div class="footrow">
      <div>
        <div class="authname">Davide Piraldo</div>
        <div class="authrole">Luxury Advisor · Pastor &amp; Reiss Monte-Carlo</div>
      </div>
      <div class="source" data-article="sources"></div>
    </div>
    <div class="disclaimer" data-article="disclaimer"></div>
  </section>

  <script src="article-loader.js"></script>
</body>
</html>
