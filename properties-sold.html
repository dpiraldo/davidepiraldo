<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sold Properties — Davide Piraldo</title>

<!--
  This page is fully dynamic — it reads content/sold-properties.json via
  sold-properties-loader.js and builds one card per entry. To add or remove
  a sold property, use the CMS ("Sold Properties" section): no HTML edits
  needed here, unlike properties-index.html.
-->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Jost:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--ink: oklch(0.14 0.015 50); --gold: oklch(0.72 0.13 85); --ivory: oklch(0.95 0.006 90);
    --stone: oklch(0.55 0.015 70); --line: oklch(0.28 0.02 60); --body: oklch(0.80 0.008 70);}
  *{box-sizing:border-box;}
  body{margin:0;background:var(--ink);color:var(--ivory);font-family:'Jost',sans-serif;}
  a{color:inherit;text-decoration:none;}
  .nav{display:flex;justify-content:space-between;align-items:center;padding:22px 6%;border-bottom:1px solid var(--line);}
  .wordmark{font-family:'Cormorant Garamond',serif;font-size:20px;letter-spacing:.04em;text-transform:uppercase;}
  .navlinks{display:flex;gap:32px;font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:var(--stone);}
  .navlinks a:hover{color:var(--gold);}
  .header{padding:96px 6% 48px;max-width:780px;}
  .eyebrow{font-size:11px;letter-spacing:.3em;color:var(--gold);text-transform:uppercase;}
  h1{font-family:'Cormorant Garamond',serif;font-weight:500;font-size:52px;line-height:1.1;margin:20px 0 0;}
  .lead{font-size:15px;color:var(--body);max-width:560px;margin-top:22px;line-height:1.8;}
  .grid{padding:20px 6% 140px;display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--line);max-width:1400px;margin:0 auto;}
  .card{background:var(--ink);display:flex;flex-direction:column;}
  .card .thumb{height:280px;background:repeating-linear-gradient(135deg,oklch(0.24 0.015 55),oklch(0.24 0.015 55) 14px,oklch(0.20 0.015 55) 14px,oklch(0.20 0.015 55) 28px);background-size:cover;background-position:center;}
  .card .body{padding:28px 30px 32px;flex:1;display:flex;flex-direction:column;}
  .card .status{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);}
  .card h2{font-family:'Cormorant Garamond',serif;font-weight:500;font-size:24px;line-height:1.3;margin:12px 0 8px;}
  .card .loc{font-size:12px;color:var(--stone);margin-bottom:12px;}
  .card .desc{font-size:13px;color:var(--body);line-height:1.6;margin:0 0 16px;}
  .card .specs{font-size:12px;color:var(--body);display:flex;gap:14px;flex-wrap:wrap;align-items:center;margin-top:auto;padding-top:16px;border-top:1px solid var(--line);}
  .card .specs .price{margin-left:auto;font-family:'Cormorant Garamond',serif;font-size:16px;color:var(--gold);}
  .empty{grid-column:1/-1;background:var(--ink);padding:48px 6%;color:var(--stone);font-size:14px;}
  @media (max-width:900px){.grid{grid-template-columns:1fr;}}
</style>
</head>
<body>

  <div class="nav">
    <a class="wordmark" href="index.html">Davide Piraldo</a>
    <div class="navlinks">
      <a href="index.html">Home</a>
      <a href="properties-index.html">Properties</a>
      <a href="properties-sold.html">Sold</a>
      <a href="blog-index.html">Journal</a>
      <a href="index.html#contact">Contact</a>
    </div>
  </div>

  <section class="header">
    <div class="eyebrow">Track Record</div>
    <h1>Sold Properties</h1>
    <p class="lead">A selection of transactions closed on behalf of buyers and sellers across Monaco.</p>
  </section>

  <section class="grid" id="sold-grid"></section>

  <footer style="padding:32px 6%;border-top:1px solid var(--line);text-align:center;font-size:10px;letter-spacing:.08em;color:var(--stone);text-transform:uppercase;">
    <a href="privacy-policy.html" style="color:var(--stone);">Privacy Policy</a> ·
    <a href="cookie-policy.html" style="color:var(--stone);">Cookie Policy</a> ·
    <a href="legal-disclaimer.html" style="color:var(--stone);">Termini &amp; Disclaimer</a>
  </footer>

  <script src="sold-properties-loader.js"></script>
</body>
</html>
