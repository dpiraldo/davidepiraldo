  PRIVATE TOOL — not linked from the public site, not in the nav.
  Generates on-brand Instagram posts (1080×1080) and Reel/Story frames

-->

<style>
  :root{
    --ink:#17130f; --ink2:#141110; --charcoal:#211c17; --gold:#c9a86a;
    --ivory:#f1efe9; --stone:#8c8579; --line:#362f29; --body:#c9c2b8;
    --photo-text:#ffffff;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:#0d0b09;color:var(--ivory);font-family:'Jost',sans-serif;}
  a{color:inherit;}

  .app{display:grid;grid-template-columns:400px 1fr;min-height:100vh;}
  .panel{padding:32px;border-right:1px solid var(--line);overflow-y:auto;max-height:100vh;}
  .panel h1{font-family:'Cormorant Garamond',serif;font-size:26px;margin:0 0 4px;}
  .panel .sub{font-size:12px;color:var(--stone);margin-bottom:32px;}

  label{display:block;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--stone);margin:20px 0 8px;}
  label:first-of-type{margin-top:0;}
  select, input[type=text], textarea{
    width:100%;background:var(--charcoal);border:1px solid var(--line);color:var(--ivory);
    padding:11px 12px;font-family:'Jost',sans-serif;font-size:14px;border-radius:2px;
  }
  textarea{resize:vertical;min-height:70px;}
  input[type=file]{width:100%;font-size:12px;color:var(--stone);}
  input[type=color]{
    width:100%;height:36px;padding:2px 4px;background:var(--charcoal);border:1px solid var(--line);
    border-radius:2px;cursor:pointer;
  }

  .brand-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px 12px;margin-bottom:8px;}
  .brand-grid label{margin:0 0 4px;font-size:10px;}
  .brand-actions{display:flex;gap:8px;margin-top:12px;}
  .brand-actions button{
    flex:1;background:var(--charcoal);border:1px solid var(--line);color:var(--body);
    padding:9px 10px;font-size:11px;letter-spacing:.06em;text-transform:uppercase;
    cursor:pointer;border-radius:2px;font-family:'Jost',sans-serif;
  }
  .brand-actions button:hover{border-color:var(--gold);color:var(--gold);}
  .panel-divider{border:none;border-top:1px solid var(--line);margin:28px 0;}

  .format-group{display:flex;flex-direction:column;gap:6px;}
  .format-group button{
    text-align:left;background:var(--charcoal);border:1px solid var(--line);color:var(--body);
    padding:11px 14px;font-size:13px;cursor:pointer;border-radius:2px;font-family:'Jost',sans-serif;
  }
  .format-group button.active{border-color:var(--gold);color:var(--gold);}

  .gen-tabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
  .gen-tabs button{
    flex:1 1 calc(50% - 3px);min-width:calc(50% - 3px);background:var(--charcoal);border:1px solid var(--line);color:var(--body);
    padding:9px 6px;font-size:10px;letter-spacing:.06em;text-transform:uppercase;
    cursor:pointer;border-radius:2px;font-family:'Jost',sans-serif;
  }
  .gen-tabs button.active{border-color:var(--gold);color:var(--gold);}
  .gen-list{display:flex;flex-direction:column;gap:6px;max-height:320px;overflow-y:auto;margin-bottom:4px;}
  .gen-post-btn{
    text-align:left;background:var(--charcoal);border:1px solid var(--line);color:var(--body);
    padding:10px 12px;font-size:12px;cursor:pointer;border-radius:2px;font-family:'Jost',sans-serif;
  }
  .gen-post-btn:hover{border-color:var(--gold);}
  .gen-post-btn.active{border-color:var(--gold);color:var(--gold);}
  .gen-post-btn .gen-num{font-family:'Cormorant Garamond',serif;font-size:18px;color:var(--ivory);line-height:1;}
  .gen-post-btn.active .gen-num{color:var(--gold);}
  .gen-post-btn .gen-title{font-size:11px;margin-top:4px;color:var(--stone);line-height:1.35;}
  .gen-hint{font-size:11px;color:var(--stone);line-height:1.5;margin:0 0 12px;}

  .download-btn{
    margin-top:32px;width:100%;padding:16px;background:var(--gold);color:var(--ink);border:none;
    font-size:12px;letter-spacing:.15em;text-transform:uppercase;cursor:pointer;font-weight:500;border-radius:2px;
  }
  .download-btn:hover{opacity:.9;}

  .stage{display:flex;align-items:center;justify-content:center;padding:40px;background:#0a0908;}
  .canvas-wrap{box-shadow:0 30px 80px rgba(0,0,0,.6);}

  /* ---- exported canvas base ---- */
  .frame{background:var(--ink);color:var(--ivory);font-family:'Jost',sans-serif;position:relative;overflow:hidden;}
  .frame .ph{background:linear-gradient(135deg,var(--ph-a),var(--ph-a) 14px,var(--ph-b) 14px,var(--ph-b) 28px);
    display:flex;align-items:center;justify-content:center;color:var(--stone);font-size:12px;text-align:center;
    background-size:cover;background-position:center;overflow:hidden;}
  .frame .ph img{width:100%;height:100%;object-fit:cover;display:block;}
  .eyebrow{font-size:11px;letter-spacing:.25em;text-transform:uppercase;color:var(--gold);}
  .serif{font-family:'Cormorant Garamond',serif;}

  /* Instagram export sizes — preview maps 1:3 (post) and 1:4 (reel) exactly */
  .post{width:360px;height:360px;padding:18px;display:flex;flex-direction:column;}
  .post.light{background:var(--light-bg);color:var(--ink);}

  .reel{width:270px;height:480px;}

  /* Reel — Monaco Brand (gold frame + top/bottom text) */
  .reel-monaco{position:relative;overflow:hidden;}
  .reel-monaco .monaco-bg{position:absolute;inset:0;}
  .reel-monaco .monaco-bg img{width:100%;height:100%;object-fit:cover;display:block;}
  .reel-monaco .monaco-frame{
    position:absolute;inset:11px;border:1px solid var(--gold);pointer-events:none;z-index:2;
  }
  .reel-monaco .monaco-frame .corner{
    position:absolute;width:14px;height:14px;border-color:var(--gold);border-style:solid;
  }
  .reel-monaco .monaco-frame .corner.tl{top:-1px;left:-1px;border-width:2px 0 0 2px;}
  .reel-monaco .monaco-frame .corner.tr{top:-1px;right:-1px;border-width:2px 2px 0 0;}
  .reel-monaco .monaco-top{
    position:absolute;top:28px;left:0;right:0;text-align:center;z-index:3;
    color:var(--photo-text);text-shadow:0 1px 12px rgba(0,0,0,.45);
  }
  .reel-monaco .monaco-top .title{
    font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:500;
    letter-spacing:.22em;text-transform:uppercase;line-height:1.1;
  }
  .reel-monaco .monaco-top .subtitle{
    font-size:7px;letter-spacing:.32em;text-transform:uppercase;margin-top:6px;opacity:.95;
  }
  .reel-monaco .monaco-foot{
    position:absolute;bottom:20px;left:22px;z-index:3;
    font-family:'Cormorant Garamond',serif;font-size:8px;letter-spacing:.06em;color:var(--photo-text);
    text-shadow:0 1px 10px rgba(0,0,0,.5);
  }
  /* same frame, square post 1080×1080 — safe zone for IG grid crop */
  .post.reel-monaco{padding:0;}
  .post.reel-monaco .monaco-frame{inset:18px;}
  .post.reel-monaco .monaco-top{top:26px;padding:0 14px;}
  .post.reel-monaco .monaco-top .title{font-size:21px;letter-spacing:.16em;line-height:1.15;}
  .post.reel-monaco .monaco-top .subtitle{font-size:6px;letter-spacing:.26em;margin-top:5px;}
  .post.reel-monaco .monaco-foot{bottom:22px;left:24px;right:24px;font-size:7px;}

  .frame .fmt-block{display:block;}
  .frame .fmt-list{margin:0;padding:0 0 0 1.1em;list-style:none;text-align:left;}
  .frame .fmt-list li{position:relative;margin:0 0 .35em;}
  .frame .fmt-list li::before{content:'•';position:absolute;left:-.9em;color:var(--gold);}
  .frame .fmt-block + .fmt-list,
  .frame .fmt-list + .fmt-block{margin-top:.45em;}
</style>

function formatEuroSqm(n) {
  if (n == null) return null;
  return '€' + Number(n).toLocaleString('en-US') + '/m²';
}

function pctFmt(val, suffix = 'vs 2024') {
  if (val == null || val === '') return '';
  const sign = val > 0 ? '+' : '';
  return `${sign}${val}% ${suffix}`;
}

function luxuryResaleDesc(d) {
  const lines = [];
  if (d.market_share_pct != null) lines.push(`${d.market_share_pct}% of Principality resales`);
  if (d.resale_volume_2025) lines.push(`${d.resale_volume_2025} in transaction value`);
  if (d.resales_change_pct != null) lines.push(pctFmt(d.resales_change_pct, 'transactions YoY'));
  if (d.resale_volume_change_pct != null) lines.push(pctFmt(d.resale_volume_change_pct, 'volume YoY'));
  if (d.price_sqm_2025) lines.push(`${formatEuroSqm(d.price_sqm_2025)} · IMSEE estimate per sqm`);
  if (d.new_build_2020_29) lines.push(`${d.new_build_2020_29} · recent new-build pricing`);
  if (d.resale_volume_note_en) lines.push(d.resale_volume_note_en);
  return lines.join('\n');
}

    if (d.new_build_change_pct != null) lines.push(pctFmt(d.new_build_change_pct, 'vs prior period'));
  } else {
    if (d.change_label_en) lines.push(d.change_label_en);
    if (d.change_24_25_pct != null) lines.push(pctFmt(d.change_24_25_pct));
    if (d.market_share_pct != null) lines.push(`${d.market_share_pct}% of Principality resales`);
  }
  return lines.filter(Boolean).join('\n');
}

function loadBrand() {
  try {
    const saved = JSON.parse(localStorage.getItem('dp-social-brand') || 'null');
    if (saved && typeof saved === 'object') return { ...DEFAULT_BRAND, ...saved };
  } catch (_) {}
  return { ...DEFAULT_BRAND };
}

function saveBrand() {
  localStorage.setItem('dp-social-brand', JSON.stringify(brand));
}

function hexToRgb(hex) {
  const h = hex.replace('#', '');
  const n = parseInt(h.length === 3 ? h.split('').map(c => c + c).join('') : h, 16);
  return { r: (n >> 16) & 255, g: (n >> 8) & 255, b: n & 255 };
}

function rgbaHex(hex, a) {
  const { r, g, b } = hexToRgb(hex);
  return `rgba(${r},${g},${b},${a})`;
}

function shadeHex(hex, pct) {
  const { r, g, b } = hexToRgb(hex);
  const blend = c => pct >= 0
    ? Math.round(c + (255 - c) * (pct / 100))
    : Math.round(c * (1 + pct / 100));
  return '#' + [blend(r), blend(g), blend(b)].map(v =>
    Math.min(255, Math.max(0, v)).toString(16).padStart(2, '0')
  ).join('');
}

function applyBrandColors() {
  const wrap = document.querySelector('.canvas-wrap');
  if (!wrap) return;
  const phA = shadeHex(brand.ink, 8);
  const phB = shadeHex(brand.ink, -6);
  wrap.style.setProperty('--ink', brand.ink);
  wrap.style.setProperty('--gold', brand.gold);
  wrap.style.setProperty('--ivory', brand.ivory);
  wrap.style.setProperty('--stone', brand.stone);
  wrap.style.setProperty('--line', brand.line);
  wrap.style.setProperty('--body', brand.body);
  wrap.style.setProperty('--photo-text', brand.photoText);
  wrap.style.setProperty('--light-bg', brand.lightBg);
  wrap.style.setProperty('--ph-a', phA);
  wrap.style.setProperty('--ph-b', phB);
  wrap.style.setProperty('--overlay-10', rgbaHex(brand.ink, 0.1));
  wrap.style.setProperty('--overlay-82', rgbaHex(brand.ink, 0.82));
  wrap.style.setProperty('--overlay-88', rgbaHex(brand.ink, 0.88));
}

function renderBrandPanel() {
  const el = document.getElementById('brandColors');
  el.innerHTML = BRAND_FIELDS.map(f => `
    <div>
      <label for="brand-${f.key}">${f.label}</label>
      <input type="color" id="brand-${f.key}" data-brand="${f.key}" value="${brand[f.key]}">
    </div>
  `).join('');
  el.querySelectorAll('input[type=color]').forEach(inp => {
    inp.addEventListener('input', e => {
      brand[e.target.dataset.brand] = e.target.value;
      saveBrand();
      applyBrandColors();
      renderCanvas();
    });
  });
}

function renderFields(){
  const defs = FIELD_DEFS[current];
  const el = document.getElementById('fields');
  el.innerHTML = defs.map(d => {
    if (d.type === 'file') {
      return `<label>${d.label}</label><input type="file" accept="image/*" data-k="${d.k}">`;
    }
    if (d.type === 'textarea') {
      return `<label>${d.label}</label><textarea data-k="${d.k}">${d.v||''}</textarea>`;
    }
    return `<label>${d.label}</label><input type="text" data-k="${d.k}" value="${d.v||''}">`;
  }).join('');

  el.querySelectorAll('input[type=text], textarea').forEach(inp => {
    inp.addEventListener('input', renderCanvas);
  });
  el.querySelectorAll('input[type=file]').forEach(inp => {
    inp.addEventListener('change', e => {
      const file = e.target.files[0];
      if (!file) return;
      if (!file.type.startsWith('image/')) {
        alert('Seleziona un file immagine (JPG, PNG, WebP). I file HEIC potrebbero non funzionare — convertili in JPG.');
        return;
      }
      const reader = new FileReader();
      reader.onload = ev => {
        const img = new Image();
        img.onload = () => {
          photoData[inp.dataset.k] = ev.target.result;
          renderCanvas();
        };
        img.onerror = () => alert('Impossibile caricare questa immagine. Prova con JPG o PNG.');
        img.src = ev.target.result;
      };
      reader.readAsDataURL(file);
    });
  });
}

function getVal(k){
  const el = document.querySelector(`#fields [data-k="${k}"]`);
  if (!el) return '';
  return el.value !== undefined ? el.value : '';
}

function escapeHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function formatText(raw) {
  if (!raw) return '';
  const lines = raw.split(/\r?\n/);
  const parts = [];
  let i = 0;
  while (i < lines.length) {
    const line = lines[i];
    if (/^\s*[-•*]\s+/.test(line)) {
      const items = [];
      while (i < lines.length && /^\s*[-•*]\s+/.test(lines[i])) {
        items.push('<li>' + escapeHtml(lines[i].replace(/^\s*[-•*]\s+/, '')) + '</li>');
        i++;
      }
      parts.push('<ul class="fmt-list">' + items.join('') + '</ul>');
    } else if (!line.trim()) {
      i++;
    } else {
      const para = [];
      while (i < lines.length && lines[i].trim() && !/^\s*[-•*]\s+/.test(lines[i])) {
        para.push(escapeHtml(lines[i]));
        i++;
      }
      parts.push('<span class="fmt-block">' + para.join('<br>') + '</span>');
    }
  }
  return parts.join('');
}

function t(k) {
  return formatText(getVal(k));
}

function setGeneratedPost(post, categoryId) {
  const cat = GENERATED_POSTS[categoryId];
  const formatId = cat?.format || 'stat';
  if (current !== formatId) {
    current = formatId;
    renderFormatButtons();
    renderFields();
  }
  if (formatId === 'quote') {
    ['quote', 'attribution'].forEach(k => {
      const el = document.querySelector(`#fields [data-k="${k}"]`);
      if (el) el.value = post[k] || '';
    });
  } else {
    ['eyebrow', 'number', 'desc', 'source'].forEach(k => {
      const el = document.querySelector(`#fields [data-k="${k}"]`);
      if (el) el.value = post[k] || '';
    });
  }
  renderCanvas();
}

function renderGeneratorPanel() {
  const tabs = document.getElementById('genTabs');
  const list = document.getElementById('genList');
  tabs.innerHTML = Object.entries(GENERATED_POSTS).map(([id, cat]) =>
    `<button type="button" data-cat="${id}" class="${id === genCategory ? 'active' : ''}">${cat.label}</button>`
  ).join('');
  tabs.querySelectorAll('button').forEach(btn => {
    btn.onclick = () => {
      const newCat = btn.dataset.cat;
      genCategory = newCat;
      const cat = GENERATED_POSTS[newCat];
      if (cat?.format === 'quote') {
        const posts = cat.posts || [];
        if (posts.length) {
          const post = posts.find(p => p.id === activeGenPostId) || posts[0];
          activeGenPostId = post.id;
          setGeneratedPost(post, newCat);
        }
      } else {
        activeGenPostId = null;
      }
      renderGeneratorPanel();
    };
  });

  const posts = GENERATED_POSTS[genCategory].posts;
  const isQuote = GENERATED_POSTS[genCategory].format === 'quote';
  list.innerHTML = posts.map(p => `
    <button type="button" class="gen-post-btn ${p.id === activeGenPostId ? 'active' : ''}" data-id="${p.id}">
      <div class="gen-num">${escapeHtml(p.preview || p.number || '«')}</div>
      <div class="gen-title">${escapeHtml(isQuote ? (p.title || p.quote) : p.title)}</div>
    </button>
  `).join('');
  list.querySelectorAll('.gen-post-btn').forEach(btn => {
    btn.onclick = () => {
      const post = posts.find(p => p.id === btn.dataset.id);
      if (!post) return;
      activeGenPostId = post.id;
      setGeneratedPost(post, genCategory);
      renderGeneratorPanel();
    };
  });
}

function statNumberSize() {
  const len = (getVal('number') || '').length;
  if (len > 14) return '24px';
  if (len > 10) return '32px';
  if (len > 7) return '40px';
  return '50px';
}

function photoSlot(key, label, extraStyle = '') {
  const data = photoData[key];
  if (data) {
    return `<div class="ph" style="${extraStyle}padding:0;"><img src="${data}" alt=""></div>`;

  return `<div class="ph" style="${extraStyle}">${label}</div>`;
}

function switchFormat(id) {
  if (id === 'quote') {
    genCategory = 'citazioni';
    const posts = GENERATED_POSTS.citazioni?.posts || [];
    if (posts.length) {
      activeGenPostId = posts[0].id;
      setGeneratedPost(posts[0], 'citazioni');
      renderGeneratorPanel();
      return;
    }
  }
  current = id;
  if (id !== 'stat') activeGenPostId = null;
  renderFormatButtons();
  renderFields();
  renderGeneratorPanel();
  renderCanvas();
}

function renderAll(){
  renderFormatButtons();
  photoData = {};
  renderFields();
  renderCanvas();
}

document.getElementById('downloadBtn').onclick = () => {
  const node = document.getElementById('canvasWrap').firstElementChild;
  const fmt = FORMATS.find(f => f.id === current);
  const sz = EXPORT[fmt.size];
  const scale = sz.outW / sz.previewW;
  const imgs = node.querySelectorAll('img');
  Promise.all([...imgs].map(img => img.complete ? Promise.resolve() : new Promise(r => { img.onload = r; img.onerror = r; })))
    .then(() => html2canvas(node, {
      scale,
      width: sz.previewW,
      height: sz.previewH,
      backgroundColor: brand.ink,
      useCORS: true,
      allowTaint: true,
    }))
    .then(canvas => {
      const out = document.createElement('canvas');
      out.width = sz.outW;
      out.height = sz.outH;
      out.getContext('2d').drawImage(canvas, 0, 0, sz.outW, sz.outH);
      const link = document.createElement('a');
      link.download = `davidepiraldo-${current}-${sz.outW}x${sz.outH}.png`;
      link.href = out.toDataURL('image/png');
      link.click();
    });
};
