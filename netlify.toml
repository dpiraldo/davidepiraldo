# Configurazione di deploy per Netlify.
# Necessaria perché Netlify sappia dove trovare la function di traduzione
# usata dal bottone "Traduci" dentro /admin (netlify/functions/translate.js).

[build]
  functions = "netlify/functions"
  publish = "."

[[headers]]
  for = "/content/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[build.environment]
  # Node 18+ ha fetch() integrato — necessario per netlify/functions/translate.js.
  # Senza questo, Netlify potrebbe usare una versione più vecchia di Node e la
  # function fallirebbe con "fetch is not defined".
  NODE_VERSION = "20"

[functions]
  node_bundler = "esbuild"
