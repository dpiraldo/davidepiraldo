# Configurazione di deploy per Netlify.
# Functions:
# - auth.js / callback.js → login GitHub del CMS (vedi SETUP-CMS.md)
# - translate.js → bottone "Traduci" dentro /admin

[build]
  functions = "netlify/functions"
  publish = "."

[[headers]]
  for = "/content/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[build.environment]
  NODE_VERSION = "20"

[functions]
  node_bundler = "esbuild"
